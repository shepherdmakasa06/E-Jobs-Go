<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | E-Jobs Go</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=4">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width: 550px;">
            <div class="text-center mb-1">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                    <span class="gradient-text">E-Jobs Go</span>
                </a>
                <h2>Create an Account</h2>
                <p class="text-secondary" style="margin-bottom: 2rem;">Join the platform and start connecting.</p>
            </div>

            <div id="alert-msg" class="alert"></div>

            <form id="register-form" enctype="multipart/form-data">
                <div class="d-flex" style="gap: 1rem; margin-bottom: 1.5rem;">
                    <button type="button" class="btn btn-outline role-btn active" data-role="provider"
                        style="flex: 1;">I am a Provider</button>
                    <button type="button" class="btn btn-outline role-btn" data-role="customer" style="flex: 1;">I am a
                        Customer</button>
                </div>
                <input type="hidden" id="role" name="role" value="provider">

                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" required
                        placeholder="Username">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="location">Address / Location</label>
                    <input type="text" id="location" name="location" class="form-control" required
                        placeholder="E.g. 453 Piki, Bindura">
                </div>

                <div class="d-flex" style="gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required
                            placeholder="••••••••">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" name="phone" class="form-control" placeholder="+263...">
                    </div>
                </div>

                <div id="provider-fields">
                    <div class="form-group">
                        <label for="skills">Your Skills</label>
                        <input type="text" id="skills" name="skills" class="form-control"
                            placeholder="e.g. Tutoring, Plumbing, Deliveries">
                    </div>
                    <div class="form-group">
                        <label for="certificate">Upload Certificate (Optional)</label>
                        <input type="file" id="certificate" name="certificate" class="form-control"
                            accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                        <small class="text-secondary" style="font-size: 0.75rem;">If you upload a certificate, you won't
                            need to write a 'why I fit' cover letter when applying for jobs.</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>

            <div class="text-center mt-2" style="margin-top: 2rem;">
                <p class="text-secondary">Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="container footer-content">
            <p>2026 &copy; Copyright all rights reserved</p>
            <p>Developed by <strong>'Pro-Tech'</strong></p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        const roleBtns = document.querySelectorAll('.role-btn');
        const roleInput = document.getElementById('role');
        const providerFields = document.getElementById('provider-fields');

        function setRole(role) {
            roleInput.value = role;
            roleBtns.forEach(btn => {
                if (btn.dataset.role === role) {
                    btn.classList.add('btn-primary');
                    btn.classList.remove('btn-outline');
                    btn.style.color = 'white';
                } else {
                    btn.classList.add('btn-outline');
                    btn.classList.remove('btn-primary');
                    btn.style.color = 'var(--text-primary)';
                }
            });
            providerFields.style.display = role === 'provider' ? 'block' : 'none';
        }

        if (roleParam === 'customer' || roleParam === 'provider') {
            setRole(roleParam);
        } else {
            setRole('provider');
        }

        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setRole(btn.dataset.role);
            });
        });
    </script>
</body>

</html>
